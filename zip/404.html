    <body>
        <style>
            body{
                background-color: rgb(38, 37, 37);
                /* background-blend-mode: color-dodge; */
                background-image: url("/static/404-static.gif");
                background-attachment: fixed;

                max-width: 100%;

        <div>
            <h1>404 whoops</h1>

        <!-- <h2>music: <a href="song link">song name here</a></h2> -->
        <script>
            // var playing = false;
            var tries = 0;
            const audioCtx = new AudioContext();
            // audioCtx.suspend();

            var outputs = [];

            const poo = async () => {
                console.log("called poo");
                try {
                    // if (audioCtx.state === "interrupted") {
                    //     audioCtx.resume().then(() => poo());
                    //     return;
                    // }
                    if (audioCtx.state === "suspended") {
                        audioCtx.resume();
                        const response = await fetch("/static/sounds/cosmic-scapes-soft-brown-noise-299934.ogg");
                        const buffer = await audioCtx.decodeAudioData(await response.arrayBuffer());
        
                        const source = audioCtx.createBufferSource();
                        outputs.push(source);
                        source.loop = true;
                        source.buffer = buffer;
            
                        const gainNode = audioCtx.createGain();
                        gainNode.gain.value = 0.4;
                        
                        source.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        
                        source.start();
                        console.log("played");
                        // playing = true;
                        tries++;
				    }
                } catch (err) {
                    console.error(`Unable to fetch the audio file. Error: ${err.message}`);
                }
            };

            // document.querySelector('html').onmouseover = function() {
            //     poo();
            // };

            // document.querySelector('html').onscroll = function() {
            //     poo();
            // };

            // document.querySelector('html').onkeydown = function() {
            //     poo();
            // };

            function runUntilPlaying() {
                if (tries > 10) return;

                poo();
                console.log(outputs);
                if(outputs.length > 1){
                    for(var i=1;i<outputs.length;i++){
                        outputs[i].disconnect();
                    }
                }
                setTimeout(runUntilPlaying, 3000);
            }

            runUntilPlaying();
        </script>
    </body>
